<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>طلباتي</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;text-align:center;background:#f2f2f2;padding:20px}
table{width:100%;background:white;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px}
</style>
</head>
<body>

<h2>طلباتي</h2>

<table id="table">
<tr>
<th>النوع</th>
<th>التاريخ</th>
<th>الحالة</th>
</tr>
</table>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwyCbtZ-VmkFHPjUJ66c_M-Iz2G1TLPbkGk169izG7zWVUxqqV3niVtb70EoXAmTcL1NA/exec";
const urlParams = new URLSearchParams(window.location.search);
const phone = urlParams.get("id");

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"getMyRequests",
phone:phone
})
})
.then(res=>res.json())
.then(data=>{
const table=document.getElementById("table");
data.forEach(r=>{
let row=table.insertRow();
row.insertCell(0).innerText=r.type;
row.insertCell(1).innerText=r.date;
row.insertCell(2).innerText=r.status;
});
});
</script>

</body>
</html>
